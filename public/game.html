<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Pic It — Game</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:#00C9B1; --teal-glow:rgba(0,201,177,0.28);
    --black:#080C0B; --card:#111816; --card2:#1A2420;
    --text:#FFFFFF; --muted:rgba(255,255,255,0.5);
    --border:rgba(0,201,177,0.18); --warn:#FF6B6B;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--black);font-family:'Nunito',sans-serif;color:var(--text);}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% -10%,rgba(0,201,177,0.06) 0%,transparent 55%);}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 60px 60px;z-index:1;opacity:0;pointer-events:none;transition:opacity 0.5s ease;}
  .screen.active{opacity:1;pointer-events:all;}
  .tv-header{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:24px 56px;z-index:10;}
  .tv-logo{font-family:'Lilita One',cursive;font-size:34px;color:var(--teal);letter-spacing:-1px;}
  .tv-round{font-size:17px;font-weight:800;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
  #screen-prompt{text-align:center;}
  .prompt-eyebrow{font-size:18px;font-weight:800;letter-spacing:5px;color:var(--muted);text-transform:uppercase;margin-bottom:20px;}
  .prompt-big{font-family:'Lilita One',cursive;font-size:108px;line-height:1.05;color:var(--text);margin-bottom:48px;max-width:1400px;}
  .timer-wrap{position:relative;width:180px;height:180px;margin:0 auto;}
  .timer-wrap svg{transform:rotate(-90deg);}
  .timer-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;}
  .timer-big{font-family:'Lilita One',cursive;font-size:70px;color:var(--teal);line-height:1;transition:color 0.4s;}
  .timer-lbl{font-size:13px;font-weight:800;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:4px;}
  .sub-bar{margin-top:44px;display:flex;align-items:center;gap:14px;font-size:19px;font-weight:800;color:var(--muted);}
  .sub-dots{display:flex;gap:9px;}
  .sub-dot{width:15px;height:15px;border-radius:50%;background:rgba(255,255,255,0.12);transition:background 0.3s,transform 0.3s;}
  .sub-dot.done{background:var(--teal);transform:scale(1.25);}
  @keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  .pulse-anim{animation:timerPulse 0.5s ease-in-out infinite;}
  #screen-gallery{text-align:center;}
  .gallery-eyebrow{font-size:17px;font-weight:800;letter-spacing:5px;color:var(--muted);text-transform:uppercase;margin-bottom:28px;}
  .reveal-stage{width:min(360px,32vw);height:min(640px,64vh);background:var(--card2);border:3px solid var(--teal);border-radius:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 70px var(--teal-glow);position:relative;overflow:hidden;margin:0 auto 28px;}
  .reveal-img{width:100%;height:100%;object-fit:contain;}
  .reveal-placeholder{font-size:160px;}
  .reveal-lbl{position:absolute;top:16px;left:16px;width:54px;height:54px;border-radius:50%;background:rgba(0,0,0,0.8);border:3px solid var(--teal);display:flex;align-items:center;justify-content:center;font-family:'Lilita One',cursive;font-size:26px;color:var(--teal);}
  .reveal-nav{font-size:20px;font-weight:800;color:var(--muted);}
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:18px;width:100%;max-width:1400px;}
  .grid-card{aspect-ratio:1;background:var(--card);border-radius:18px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  .grid-card img{width:100%;height:100%;object-fit:contain;}
  .grid-lbl{position:absolute;top:9px;left:9px;background:rgba(0,0,0,0.8);border-radius:7px;padding:3px 10px;font-family:'Lilita One',cursive;font-size:18px;color:var(--teal);}
  #screen-voting{text-align:center;}
  .vote-eyebrow{font-size:17px;font-weight:800;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
  .vote-prompt{font-family:'Lilita One',cursive;font-size:48px;color:var(--teal);margin-bottom:36px;}
  .vote-grid{display:flex;gap:20px;width:100%;max-width:1400px;justify-content:center;flex-wrap:wrap;}
  .vote-card{flex:1;min-width:160px;max-width:260px;background:var(--card);border:2px solid var(--border);border-radius:18px;padding:18px;text-align:center;transition:border-color 0.3s,box-shadow 0.3s;}
  .vote-card.leading{border-color:var(--teal);box-shadow:0 0 30px var(--teal-glow);}
  .vote-photo{aspect-ratio:1;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:12px;}
  .vote-photo img{width:100%;height:100%;object-fit:contain;}
  .vote-lbl{font-family:'Lilita One',cursive;font-size:20px;color:var(--teal);margin-bottom:6px;}
  .vote-bar-wrap{background:rgba(255,255,255,0.06);border-radius:100px;height:10px;margin-bottom:8px;overflow:hidden;}
  .vote-bar{height:100%;background:var(--teal);border-radius:100px;width:0%;transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1);}
  .vote-count{font-size:26px;font-weight:900;}
  .vote-timer{font-size:18px;font-weight:800;color:var(--muted);margin-top:28px;}
#screen-results{text-align:center;}
  .results-layout{display:flex;gap:24px;align-items:flex-start;width:100%;max-width:1400px;justify-content:center;}
  .results-main{flex:1;text-align:center;}
  .totals-sidebar{width:180px;flex-shrink:0;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:14px 12px;}
  .totals-sidebar-title{font-size:12px;font-weight:800;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
  .totals-row{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
  .totals-avatar{width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#080C0B;flex-shrink:0;}
  .totals-name{font-size:13px;font-weight:800;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .totals-score{font-size:13px;font-weight:900;color:var(--teal);}
  .results-eyebrow{font-size:16px;font-weight:800;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
  .winner-card{display:flex;align-items:center;gap:32px;background:var(--card);border:2px solid var(--teal);border-radius:28px;padding:28px 44px;box-shadow:0 0 60px var(--teal-glow);margin:14px auto 28px;max-width:780px;}
  .winner-photo{width:150px;height:150px;border-radius:14px;background:var(--card2);border:3px solid var(--teal);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .winner-photo img{width:100%;height:100%;object-fit:contain;}
  .winner-info{text-align:left;}
  .winner-crown{font-size:32px;margin-bottom:4px;}
  .winner-name{font-family:'Lilita One',cursive;font-size:52px;color:var(--teal);line-height:1;}
  .winner-votes{font-size:20px;font-weight:700;color:var(--muted);margin-top:6px;}
  .results-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;width:100%;max-width:1400px;}
  .result-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px;text-align:center;flex:1;min-width:130px;max-width:200px;}
  .result-photo{aspect-ratio:1;border-radius:9px;background:var(--card2);overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:9px;}
  .result-photo img{width:100%;height:100%;object-fit:contain;}
  .result-player{font-size:15px;font-weight:800;margin-bottom:3px;}
  .result-votes{font-size:13px;font-weight:700;color:var(--teal);}
  .next-btn{margin-top:32px;background:var(--teal);color:var(--black);border:none;border-radius:100px;padding:18px 56px;font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;cursor:pointer;box-shadow:0 0 40px var(--teal-glow);letter-spacing:1px;transition:transform 0.15s;}
  .next-btn:hover{transform:scale(1.04);}
  #screen-final{text-align:center;}
  .final-confetti{font-size:48px;margin-bottom:12px;animation:bounce 0.8s ease-in-out infinite alternate;}
  @keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-16px)}}
  .final-title{font-family:'Lilita One',cursive;font-size:80px;color:var(--teal);margin-bottom:8px;}
  .final-sub{font-size:22px;font-weight:700;color:var(--muted);margin-bottom:40px;}
  .final-lb{display:flex;flex-direction:column;gap:12px;width:100%;max-width:640px;margin:0 auto;}
  .final-row{display:flex;align-items:center;gap:18px;background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px 24px;}
  .final-row.first{border-color:var(--teal);box-shadow:0 0 30px var(--teal-glow);}
  .final-rank{font-family:'Lilita One',cursive;font-size:28px;color:var(--muted);width:32px;}
  .final-rank.gold{color:var(--teal);}
  .final-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:var(--black);flex-shrink:0;}
  .final-name{font-size:22px;font-weight:800;}
  .final-score{margin-left:auto;font-size:24px;font-weight:900;}
  .play-again-btn{margin-top:40px;background:var(--teal);color:var(--black);border:none;border-radius:100px;padding:20px 64px;font-family:'Nunito',sans-serif;font-size:24px;font-weight:900;cursor:pointer;box-shadow:0 0 40px var(--teal-glow);letter-spacing:1px;transition:transform 0.15s;}
  .play-again-btn:hover{transform:scale(1.04);}
</style>

<div class="tv-header">
  <div class="tv-logo">PIC IT</div>

</div>

<div class="screen active" id="screen-prompt">

      <circle id="tv-arc" cx="90" cy="90" r="78" fill="none" stroke="var(--teal)" stroke-width="10" stroke-dasharray="490.09" stroke-dashoffset="0" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear,stroke 0.5s;"/>

<div class="screen" id="screen-results">

          <div class="winner-crown">🏆</div>

          <div class="winner-votes" id="winner-votes-text">… votes</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA9MXjistGBfnMBnLAkVYS3gSsX3LerPNA",
  authDomain: "pic-it-bf268.firebaseapp.com",
  databaseURL: "https://pic-it-bf268-default-rtdb.firebaseio.com",
  projectId: "pic-it-bf268",
  storageBucket: "pic-it-bf268.firebasestorage.app",
  messagingSenderId: "992063984744",
  appId: "1:992063984744:web:e3222850cae7f51d9a57dd"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params = new URLSearchParams(window.location.search);
const ROOM = params.get('room');
if (!ROOM) {
  document.body.innerHTML = '<div style="color:white;text-align:center;padding:100px;font-family:Nunito,sans-serif;font-size:32px;">No room code found.<br><br><a href="/" style="color:#00C9B1">← Back to home</a></div>';
}

const TIMER_DURATION = 60;
const VOTE_DURATION = 30;
const TOTAL_ROUNDS = 10;

let gameData = null;
let timerInterval = null;
let voteTimerInterval = null;
let timerSecsLeft = TIMER_DURATION;

// State tracking per round — keyed by round number to prevent stale data
let processedRound = { prompt: -1, gallery: -1, voting: -1, results: -1 };

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── AUDIO — FUNKY GROOVE (Option C) ──
// Bass-driven funk that builds in intensity as timer runs out
let audioCtx = null, masterGain = null, beatScheduler = null, nextBeatTime = 0;
 
function ensureAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0.18, audioCtx.currentTime);
  masterGain.connect(audioCtx.destination);
}
 
function playFunkKick(t) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.frequency.setValueAtTime(200, t);
  o.frequency.exponentialRampToValueAtTime(45, t + 0.1);
  g.gain.setValueAtTime(0.7, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t + 0.25);
}
 
function playFunkSnare(t, accent=false) {
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.12, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.5);
  const s = audioCtx.createBufferSource(), g = audioCtx.createGain(), f = audioCtx.createBiquadFilter();
  f.type = 'bandpass'; f.frequency.value = accent ? 2800 : 2200; f.Q.value = 0.8;
  g.gain.setValueAtTime(accent ? 0.55 : 0.35, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  s.buffer = buf; s.connect(f); f.connect(g); g.connect(masterGain); s.start(t); s.stop(t + 0.15);
}
 
function playHihat(t, open=false) {
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 2);
  const s = audioCtx.createBufferSource(), g = audioCtx.createGain(), f = audioCtx.createBiquadFilter();
  f.type = 'highpass'; f.frequency.value = 10000;
  g.gain.setValueAtTime(open ? 0.18 : 0.09, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + (open ? 0.1 : 0.04));
  s.buffer = buf; s.connect(f); f.connect(g); g.connect(masterGain); s.start(t); s.stop(t + 0.12);
}
 
function playFunkBass(freq, t, dur, gain=0.12) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  const f = audioCtx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 400;
  o.type = 'sawtooth'; o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.85);
  o.connect(f); f.connect(g); g.connect(masterGain); o.start(t); o.stop(t + dur);
}
 
function playFunkChord(freqs, t, dur, gain=0.04) {
  freqs.forEach(freq => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.7);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t + dur);
  });
}
 
// Funky groove pattern in E minor pentatonic
// Bass line: E2-E2-G2-A2-B2-A2-G2-E2
const FUNK_BASS = [82.41, 82.41, 98.00, 110.00, 123.47, 110.00, 98.00, 82.41];
// Melody line (higher octave)
const FUNK_MELODY = [329.63, 392.00, 440.00, 392.00, 329.63, 293.66, 329.63, 392.00];
// Chord stabs
const FUNK_CHORDS = [
  [164.81, 196.00, 246.94], // Em
  [196.00, 246.94, 293.66], // G
  [220.00, 277.18, 329.63], // Am
  [246.94, 293.66, 369.99], // B7
];
 
let chordIdx = 0;
let bassIdx = 0;
let melodyIdx = 0;
 
function scheduleFunkBar(t, bpm, intensity) {
  const beat = 60 / bpm;
  const sixteenth = beat / 4;
 
  // Kick drum — funky syncopated pattern
  // Beats 1, and "and" of 2, beat 3, "and" of 4
  playFunkKick(t);
  playFunkKick(t + beat * 1.5);
  playFunkKick(t + beat * 2);
  playFunkKick(t + beat * 3.5);
 
  // Snare on 2 and 4, with accent on 4
  playFunkSnare(t + beat, false);
  playFunkSnare(t + beat * 3, true);
 
  // Hihat 16th notes — the funkier the better
  for (let i = 0; i < 16; i++) {
    const isOpen = i === 2 || i === 6 || i === 10 || i === 14;
    const skip = i === 3 || i === 11; // ghost notes feel
    if (!skip) playHihat(t + i * sixteenth, isOpen);
  }
 
  // Bass line — 2 notes per beat
  for (let i = 0; i < 8; i++) {
    const freq = FUNK_BASS[(bassIdx + i) % FUNK_BASS.length];
    const noteT = t + i * (beat / 2);
    const noteDur = beat * 0.45;
    playFunkBass(freq, noteT, noteDur, 0.1 + intensity * 0.06);
  }
  bassIdx = (bassIdx + 8) % FUNK_BASS.length;
 
  // Chord stabs on beat 1 and beat 3 (funky rhythm guitar feel)
  if (intensity > 0.1) {
    const chord = FUNK_CHORDS[chordIdx % FUNK_CHORDS.length];
    playFunkChord(chord, t, beat * 0.3, 0.035 + intensity * 0.025);
    playFunkChord(chord, t + beat * 2 + sixteenth, beat * 0.25, 0.03 + intensity * 0.02);
    if (intensity > 0.5) {
      playFunkChord(chord, t + beat * 3, beat * 0.2, 0.025 + intensity * 0.02);
    }
    chordIdx++;
  }
 
  // Melody comes in at medium intensity
  if (intensity > 0.35) {
    for (let i = 0; i < 4; i++) {
      const freq = FUNK_MELODY[(melodyIdx + i) % FUNK_MELODY.length];
      const noteT = t + i * beat + (beat / 2);
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(freq * 2, noteT);
      g.gain.setValueAtTime(0, noteT);
      g.gain.linearRampToValueAtTime(0.04 + intensity * 0.03, noteT + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, noteT + beat * 0.4);
      o.connect(g); g.connect(masterGain); o.start(noteT); o.stop(noteT + beat * 0.45);
    }
    melodyIdx = (melodyIdx + 4) % FUNK_MELODY.length;
  }
}
 
function startMusic() {
  ensureAudio();
  stopMusic();
  chordIdx = 0; bassIdx = 0; melodyIdx = 0;
  nextBeatTime = audioCtx.currentTime + 0.1;
 
  beatScheduler = setInterval(() => {
    const elapsed = TIMER_DURATION - timerSecsLeft;
    const progress = Math.min(1, elapsed / TIMER_DURATION);
    const intensity = Math.min(1, progress * 1.3);
 
    // BPM starts at 96 (classic funk tempo) and builds to 126
    const bpm = 96 + progress * 30;
    const barLen = (60 / bpm) * 4;
 
    while (nextBeatTime < audioCtx.currentTime + 0.6) {
      scheduleFunkBar(nextBeatTime, bpm, intensity);
      nextBeatTime += barLen;
    }
 
    // Volume builds with intensity
    masterGain.gain.setValueAtTime(
      Math.min(0.35, 0.16 + intensity * 0.19),
      audioCtx.currentTime
    );
  }, 50);
}
 
function stopMusic() {
  if (beatScheduler) { clearInterval(beatScheduler); beatScheduler = null; }
  if (masterGain) {
    masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
  }
}

// ── LISTEN TO GAME ──
if (ROOM) {
  db.ref(`games/${ROOM}`).on('value', (snap) => {
    if (!snap.exists()) return;
    gameData = snap.val();
    const round = gameData.round || 1;
    document.getElementById('round-label').textContent = `Round ${round} of ${gameData.totalRounds || TOTAL_ROUNDS}`;

    if (gameData.status === 'playing' && processedRound.prompt !== round) {
      processedRound.prompt = round;
      showPromptScreen(gameData);
    }
    if (gameData.status === 'gallery' && processedRound.gallery !== round) {
      processedRound.gallery = round;
      showGalleryScreen(gameData);
    }
    if (gameData.status === 'voting' && processedRound.voting !== round) {
      processedRound.voting = round;
      showVotingScreen(gameData);
    }
   if (gameData.status === 'results' && processedRound.results !== round) {
      processedRound.results = round;
      setTimeout(() => showResultsScreen(gameData), 1000);
    }
    if (gameData.status === 'finished') {
      showFinalScreen(gameData);
    }
  });
}

// ── PROMPT ──
function showPromptScreen(game) {
  clearInterval(timerInterval);
  clearInterval(voteTimerInterval);
  stopMusic();
  timerSecsLeft = TIMER_DURATION;
  const timerStart = game.timerStart || Date.now();

  document.getElementById('prompt-text').textContent = game.currentPrompt || '…';
  document.getElementById('tv-arc').style.stroke = 'var(--teal)';
  document.getElementById('tv-timer').style.color = 'var(--teal)';
  document.getElementById('tv-timer').classList.remove('pulse-anim');

  const playerCount = Object.keys(game.players || {}).length;
  renderSubDots(playerCount, Object.keys(game.submissions || {}).length);
  goTo('screen-prompt');
  startMusic();

  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - timerStart) / 1000);
    timerSecsLeft = Math.max(0, TIMER_DURATION - elapsed);
    document.getElementById('tv-timer').textContent = timerSecsLeft;
    document.getElementById('tv-arc').style.strokeDashoffset = 490.09 * (elapsed / TIMER_DURATION);
    const subCount = Object.keys((gameData && gameData.submissions) || {}).length;
    renderSubDots(playerCount, subCount);
    if (timerSecsLeft <= 10) {
      document.getElementById('tv-arc').style.stroke = 'var(--warn)';
      document.getElementById('tv-timer').style.color = 'var(--warn)';
      document.getElementById('tv-timer').classList.add('pulse-anim');
    }
    if (timerSecsLeft <= 0) {
      clearInterval(timerInterval);
      stopMusic();
      db.ref(`games/${ROOM}`).update({ status: 'gallery' });
    }
  }, 500);
}

function renderSubDots(total, done) {
  document.getElementById('sub-dots').innerHTML = Array.from({length: total}, (_,i) =>
    `<div class="sub-dot ${i < done ? 'done' : ''}"></div>`).join('');
  document.getElementById('sub-count').textContent = `${done} of ${total}`;
  if (done >= total && total > 0 && gameData && gameData.status === 'playing') {
    clearInterval(timerInterval);
    stopMusic();
    setTimeout(() => db.ref(`games/${ROOM}`).update({ status: 'gallery' }), 1200);
  }
}

// ── GALLERY ──
function showGalleryScreen(game) {
  clearInterval(timerInterval);
  clearInterval(voteTimerInterval);

  // Snapshot submissions at the moment gallery starts — freeze them
   const subs = game.submissions || {};
  const photos = Object.entries(subs)
    .filter(([id,s]) => s.photoURL)
    .map(([id,s],i) => ({ id, label: String.fromCharCode(65+i), ...s }));

  if (photos.length === 0) {
    db.ref(`games/${ROOM}`).update({ status: 'results' });
    return;
  }

  document.getElementById('reveal-wrap').style.display = 'block';
  document.getElementById('gallery-grid').style.display = 'none';
  document.getElementById('gallery-label').textContent = 'Revealing photos…';
  goTo('screen-gallery');

  let idx = 0;
  const stage = document.getElementById('reveal-stage');

  function revealNext() {
    if (idx >= photos.length) {
      showAllPhotos(photos);
      return;
    }
    const photo = photos[idx];
    document.getElementById('reveal-lbl').textContent = photo.label;
    document.getElementById('reveal-nav').textContent = `Photo ${idx+1} of ${photos.length}`;
    stage.style.opacity = '0';
    stage.style.transform = 'scale(0.88)';
    setTimeout(() => {
      document.getElementById('reveal-content').innerHTML = photo.photoURL
        ? `<img class="reveal-img" src="${photo.photoURL}" alt="">`
        : `<div class="reveal-placeholder">📷</div>`;
      stage.style.transition = 'opacity 0.45s ease,transform 0.45s cubic-bezier(0.34,1.56,0.64,1)';
      stage.style.opacity = '1';
      stage.style.transform = 'scale(1)';
      idx++;
      setTimeout(revealNext, 7000);
    }, 320);
  }
  revealNext();
}

function showAllPhotos(photos) {
  document.getElementById('reveal-wrap').style.display = 'none';
  document.getElementById('gallery-label').textContent = 'All photos — vote on your phone!';
  const grid = document.getElementById('gallery-grid');
  grid.style.display = 'grid';
  grid.innerHTML = photos.map(p => `
    <div class="grid-card">
      <div class="grid-lbl">${p.label}</div>
      ${p.photoURL ? `<img src="${p.photoURL}" alt="">` : '<div style="font-size:56px;">📷</div>'}
    </div>`).join('');
  setTimeout(() => {
    db.ref(`games/${ROOM}`).update({ status: 'voting', voteStart: Date.now() });
  }, 4000);
}

// ── VOTING ──
function showVotingScreen(game) {
  clearInterval(voteTimerInterval);
 const subs = game.submissions || {};
  const totalPlayers = Object.keys(game.players || {}).length;
  const photos = Object.entries(subs)
    .filter(([id,s]) => s.photoURL)
    .map(([id,s],i) => ({ id, label: String.fromCharCode(65+i), ...s }));

  if (photos.length === 0) {
    awardPoints(game);
    return;
  }
  document.getElementById('vote-prompt-text').textContent = game.currentPrompt || '';
  renderVoteGrid(photos);
  goTo('screen-voting');

  let vSecs = VOTE_DURATION;
  document.getElementById('vote-timer-num').textContent = vSecs;

  voteTimerInterval = setInterval(() => {
    const liveSubs = (gameData && gameData.submissions) || {};
    const livePhotos = Object.entries(liveSubs).map(([id,s],i) => ({
      id, label: String.fromCharCode(65+i), ...s
    }));
    updateVoteBars(livePhotos);

    // Check if all votes are in
    const votes = (gameData && gameData.votes) ? Object.keys(gameData.votes).length : 0;
    if (votes >= totalPlayers) {
      clearInterval(voteTimerInterval);
      awardPoints(game);
      return;
    }

    vSecs--;
    document.getElementById('vote-timer-num').textContent = Math.max(0, vSecs);
    if (vSecs <= 0) {
      clearInterval(voteTimerInterval);
      awardPoints(game);
    }
  }, 1000);
}

function renderVoteGrid(photos) {
  document.getElementById('vote-grid').innerHTML = photos.map(p => `
    <div class="vote-card" id="vc-${p.id}">
      <div class="vote-photo">${p.photoURL ? `<img src="${p.photoURL}" alt="">` : '<div style="font-size:52px;">📷</div>'}</div>
      <div class="vote-lbl">${p.label}</div>
      <div class="vote-bar-wrap"><div class="vote-bar" id="vbar-${p.id}" style="width:0%"></div></div>
      <div class="vote-count" id="vcnt-${p.id}">0</div>
    </div>`).join('');
}

function updateVoteBars(photos) {
  const max = Math.max(...photos.map(p => p.votes||0), 1);
  photos.forEach(p => {
    const bar = document.getElementById(`vbar-${p.id}`);
    const cnt = document.getElementById(`vcnt-${p.id}`);
    const card = document.getElementById(`vc-${p.id}`);
    if (bar) bar.style.width = ((p.votes||0)/max*100)+'%';
    if (cnt) cnt.textContent = p.votes||0;
    const isLeading = (p.votes||0) > 0 && (p.votes||0) === Math.max(...photos.map(x=>x.votes||0));
    if (card) card.classList.toggle('leading', isLeading);
  });
}

// ── AWARD POINTS ──
async function awardPoints(game) {
  const subs = game.submissions || {};
  // Read current scores fresh from Firebase to avoid stale data
  const freshSnap = await db.ref(`games/${ROOM}/players`).once('value');
  const freshPlayers = freshSnap.val() || {};
  const updates = {};
  Object.entries(subs).forEach(([playerId, sub]) => {
    const currentScore = freshPlayers[playerId] ? (freshPlayers[playerId].score || 0) : 0;
    updates[`games/${ROOM}/players/${playerId}/score`] = currentScore + (sub.votes || 0);
  });
 await db.ref().update(updates);
  // Small delay to ensure score writes propagate before results screen renders
  await new Promise(resolve => setTimeout(resolve, 800));
  await db.ref(`games/${ROOM}`).update({ status: 'results' });
}
// ── RESULTS ──
function showResultsScreen(game) {
  const subs = game.submissions || {};
  const photos = Object.entries(subs).map(([id,s]) => ({id,...s})).sort((a,b) => (b.votes||0)-(a.votes||0));
  const maxVotes = photos[0] ? (photos[0].votes || 0) : 0;
  const winners = photos.filter(p => (p.votes||0) === maxVotes && maxVotes > 0);

  const wp = document.getElementById('winner-photo');
  if (winners.length > 0) {
    wp.innerHTML = winners[0].photoURL ? `<img src="${winners[0].photoURL}" alt="">` : '<div style="font-size:60px;">📷</div>';
    document.getElementById('winner-name').textContent = winners.length > 1 ? winners.map(w => w.playerName).join(' & ') : (winners[0].playerName || '?');
    document.getElementById('winner-votes-text').textContent = `${maxVotes} vote${maxVotes!==1?'s':''} · ${game.currentPrompt}`;
  }

  // Use fresh gameData scores since Firebase listener will have latest values
  const players = (gameData && gameData.players) || game.players || {};
  const totalVotesAllRounds = Object.entries(players).map(([id,p]) => ({id,...p})).sort((a,b)=>(b.score||0)-(a.score||0));
  const maxScore = totalVotesAllRounds[0]?.score || 0;

  document.getElementById('results-round-label').textContent = `Round ${game.round} Results`;
  document.getElementById('results-row').innerHTML = photos.map(p => `
    <div class="result-card" ${(p.votes||0)===maxVotes && maxVotes>0 ? 'style="border-color:var(--teal)"' : ''}>
      <div class="result-photo">${p.photoURL?`<img src="${p.photoURL}" alt="">`:'<div style="font-size:40px;">📷</div>'}</div>
      <div class="result-player">${p.playerName||'?'}</div>
      <div class="result-votes">${p.votes||0} vote${(p.votes||0)!==1?'s':''} ${(p.votes||0)===maxVotes && maxVotes>0?'🏆':''}</div>
    </div>`).join('');

  // Sidebar totals
  document.getElementById('totals-sidebar').innerHTML = `
    <div class="totals-sidebar-title">Totals</div>
    ${totalVotesAllRounds.map((p,i) => `
      <div class="totals-row">
        <div class="totals-avatar" style="background:${p.color||'#00C9B1'}">${p.name[0].toUpperCase()}</div>
        <div class="totals-name">${p.name}</div>
        <div class="totals-score">${p.score||0}</div>
      </div>`).join('')}`;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = (game.round||1) >= (game.totalRounds||TOTAL_ROUNDS) ? 'See Final Results →' : 'Next Round →';
  goTo('screen-results');
}

// ── ADVANCE ROUND ──
window.advanceRound = async function() {
  if (!gameData) return;
  const nextRound = (gameData.round||1) + 1;
  if (nextRound > (gameData.totalRounds||TOTAL_ROUNDS)) {
    await db.ref(`games/${ROOM}`).update({ status: 'finished' });
    return;
  }
  const prompts = gameData.prompts || [];
  const nextPrompt = prompts[nextRound - 1] || 'Selfie!';
  // Clear submissions and votes first, then update status
  await db.ref(`games/${ROOM}/submissions`).remove();
  await db.ref(`games/${ROOM}/votes`).remove();
  await db.ref(`games/${ROOM}`).update({
    status: 'playing',
    round: nextRound,
    currentPrompt: nextPrompt,
    timerStart: Date.now()
  });
};

// ── FINAL ──
function showFinalScreen(game) {
  const players = (gameData && gameData.players) || {};
  const totalVotesAllRounds = Object.entries(players).map(([id,p]) => ({id,...p})).sort((a,b)=>(b.score||0)-(a.score||0));
  const maxScore = totalVotesAllRounds[0]?.score || 0;
  const winners = lb.filter(p => (p.score||0) === topScore);
  document.getElementById('final-winner-name').textContent = winners.map(w => w.name).join(' & ') || '?';
  document.getElementById('final-winner-sub').textContent = `with ${topScore} point${topScore!==1?'s':''}`;
  document.getElementById('final-lb').innerHTML = lb.map((p,i) => `
    <div class="final-row ${(p.score||0)===topScore?'first':''}">
      <div class="final-rank ${(p.score||0)===topScore?'gold':''}">${(p.score||0)===topScore?'🏆':i+1}</div>
      <div class="final-avatar" style="background:${p.color||'#00C9B1'}">${p.name[0].toUpperCase()}</div>
      <div class="final-name">${p.name}</div>
      <div class="final-score">${p.score||0} pts</div>
    </div>`).join('');
  goTo('screen-final');
}

// ── PLAY AGAIN ──
window.playAgain = async function() {
  const players = gameData ? (gameData.players || {}) : {};
  const resetPlayers = {};
  Object.entries(players).forEach(([id,p]) => { resetPlayers[id] = {...p, score:0}; });
  await db.ref(`games/${ROOM}`).update({
    status: 'lobby', round: 0, currentPrompt: null,
    submissions: null, votes: null, players: resetPlayers
  });
  window.location.href = '/donate.html';
};

document.addEventListener('click', () => ensureAudio(), {once:true});
</script>
