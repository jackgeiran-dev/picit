<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Pic It — Give Back</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --teal: #00C9B1;
    --teal-glow: rgba(0,201,177,0.25);
    --black: #080C0B;
    --card: #111816;
    --card2: #1A2420;
    --text: #FFFFFF;
    --muted: rgba(255,255,255,0.5);
    --border: rgba(0,201,177,0.18);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--black); font-family:'Nunito',sans-serif; color:var(--text); }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,201,177,0.07) 0%, transparent 55%);
  }

  .page {
    width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:36px 60px;
    animation: fadeIn 0.8s ease both;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* ── Header ── */
  .header { text-align:center; margin-bottom:32px; }

  .header-title {
    font-family:'Lilita One',cursive;
    font-size:80px; line-height:1.05;
    color:var(--text);
  }

  /* The word PIC gets the teal color + a playful underline to signal the pun */
  .pun-word {
    color: var(--teal);
    position: relative;
    display: inline-block;
  }
  .pun-word::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    bottom: -4px;
    height: 5px;
    background: var(--teal);
    border-radius: 100px;
    box-shadow: 0 0 12px var(--teal-glow);
  }

  .header-donate {
    font-size:22px; font-weight:800;
    color:var(--muted); letter-spacing:3px;
    text-transform:uppercase; margin-top:12px;
  }
  .header-donate span { color:var(--teal); }

  /* ── Charity grid ── */
  .charity-grid {
    display:flex; gap:18px;
    width:100%; max-width:1500px;
    justify-content:center;
  }

  .charity-card {
    flex:1; min-width:0;
    background:var(--card);
    border:1.5px solid var(--border);
    border-radius:20px;
    padding:20px 14px;
    display:flex; flex-direction:column;
    align-items:center; gap:12px;
    transition:border-color 0.3s, box-shadow 0.3s;
    animation: cardIn 0.6s ease both;
  }
  .charity-card:nth-child(1) { animation-delay:0.1s; }
  .charity-card:nth-child(2) { animation-delay:0.2s; }
  .charity-card:nth-child(3) { animation-delay:0.3s; }
  .charity-card:nth-child(4) { animation-delay:0.4s; }
  .charity-card:nth-child(5) { animation-delay:0.5s; }
  @keyframes cardIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .charity-card:hover { border-color:var(--teal); box-shadow:0 0 30px var(--teal-glow); }

  .charity-qr {
    background:white;
    border-radius:12px;
    padding:10px;
    width:140px; height:140px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .charity-qr canvas, .charity-qr img { width:120px!important; height:120px!important; }

  .charity-name {
    font-size:14px; font-weight:900;
    text-align:center; line-height:1.35;
    color:var(--text);
  }

  /* ── Home button ── */
  .home-btn {
    margin-top:28px;
    background:var(--teal); color:var(--black);
    border:none; border-radius:100px;
    padding:16px 52px; font-family:'Nunito',sans-serif;
    font-size:20px; font-weight:900; cursor:pointer;
    letter-spacing:1px;
    box-shadow: 0 0 40px var(--teal-glow), 0 8px 24px rgba(0,0,0,0.4);
    transition:transform 0.15s, box-shadow 0.15s;
  }
  .home-btn:hover { transform:scale(1.05); box-shadow:0 0 60px rgba(0,201,177,0.5); }
  .home-btn:active { transform:scale(0.97); }

  /* ── Floating dollars ── */
  .dollar {
    position:fixed; pointer-events:none;
    font-size:26px; opacity:0;
    animation:floatUp 3s ease-in-out infinite;
  }
  @keyframes floatUp {
    0%   { opacity:0; transform:translateY(0) rotate(0deg); }
    20%  { opacity:0.5; }
    80%  { opacity:0.2; }
    100% { opacity:0; transform:translateY(-220px) rotate(15deg); }
  }
</style>
</head>
<body>

<div class="page">

  <div class="header">
    <div class="header-title">
      Winner Gets to <span class="pun-word">Pic</span> the Charity
    </div>
    <div class="header-donate">Donate <span>$1</span> — Every dollar counts</div>
  </div>

  <div class="charity-grid">

    <div class="charity-card">
      <div class="charity-qr" id="qr-stjude"></div>
      <div class="charity-name">St. Jude Children's Research Hospital</div>
    </div>

    <div class="charity-card">
      <div class="charity-qr" id="qr-blood"></div>
      <div class="charity-name">Blood Cancer United</div>
    </div>

    <div class="charity-card">
      <div class="charity-qr" id="qr-oceana"></div>
      <div class="charity-name">Oceana — Protecting the World's Oceans</div>
    </div>

    <div class="charity-card">
      <div class="charity-qr" id="qr-wck"></div>
      <div class="charity-name">World Central Kitchen</div>
    </div>

    <div class="charity-card">
      <div class="charity-qr" id="qr-chrysalis"></div>
      <div class="charity-name">Chrysalis — Saving Lives Through Jobs</div>
    </div>

  </div>

  <button class="home-btn" onclick="window.location.href='/'">← Home</button>

</div>

<script>
// Floating dollar signs
const positions = [4,14,24,38,52,66,78,90];
positions.forEach((left, i) => {
  const el = document.createElement('div');
  el.className = 'dollar';
  el.textContent = '$';
  el.style.left = left + '%';
  el.style.bottom = '-40px';
  el.style.animationDelay = (i * 0.45) + 's';
  el.style.animationDuration = (2.6 + Math.random() * 0.8) + 's';
  document.body.appendChild(el);
});

// QR codes
const charities = [
  { id: 'qr-stjude',    url: 'https://www.stjude.org/donate/donate-to-st-jude.html' },
  { id: 'qr-blood',     url: 'https://bloodcancerunited.org/?campaign=390400' },
  { id: 'qr-oceana',    url: 'https://act.oceana.org/page/141584/donate/1?ea.tracking.id=website&transaction.donationAmt=&op=DONATE' },
  { id: 'qr-wck',       url: 'https://donate.wck.org/campaign/749360/donate?c_src=2026-site-navbar' },
  { id: 'qr-chrysalis', url: 'https://www.changelives.org/donate/' },
];

charities.forEach(c => {
  new QRCode(document.getElementById(c.id), {
    text: c.url,
    width: 120,
    height: 120,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
});
</script>
</body>
</html>
